<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="./assets/css/normolize.css">
  <link rel="stylesheet" href="./style.css">
  <title>cssMemeSlider</title>
</head>
<body>
  <div class="slider">
    <div class="slider_images">
      <input type="radio" name="slides" id="slide_dot_1" checked>
      <input type="radio" name="slides" id="slide_dot_2">
      <input type="radio" name="slides" id="slide_dot_3">
      <input type="radio" name="slides" id="slide_dot_4">
      <input type="radio" name="slides" id="slide_dot_5">
      <div class="slide slide_1">
        <img src="https://source.unsplash.com/_EG_Th77EmQ" class="img1" alt="img1">
        <div class="quote quote_1">We do not remember days, we remember moments</div>
      </div>
      <div class="slide slide_2">
        <img src="https://source.unsplash.com/1P6LZ8S8XJc" class="img2" alt="img2">
        <div class="quote quote_2">Remember who you are</div>
      </div>
      <div class="slide slide_3">
        <img src="https://source.unsplash.com/O6DUoIl6NWA" class="img3" alt="img3">
        <div class="quote quote_3">Lost time is never found again</div>
      </div>
      <div class="slide slide_4">
        <img src="https://source.unsplash.com/6QMEh31lUes" class="img4" alt="img4">
        <div class="quote quote_4">Everyone has one’s own path</div>
      </div>
      <div class="slide slide_5">
        <img src="https://source.unsplash.com/2Ts5HnA67k8" class="img5" alt="img5">
        <div class="quote quote_5">I’ll think about it tomorrow</div>
      </div>
    </div>
    <div class="slide_dots">
      <label for="slide_dot_1"></label>
      <label for="slide_dot_2"></label>
      <label for="slide_dot_3"></label>
      <label for="slide_dot_4"></label>
      <label for="slide_dot_5"></label>
    </div>
  </div>
</body>
</html>
